name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # Stage 1 : Tests
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: app/package-lock.json
      - run: cd app && npm ci
      - name: Run tests
        run: |
          cd app
          set -o pipefail
          npm test 2>&1 | tee test-output.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-output-node-${{ matrix.node-version }}
          path: app/test-output.txt

  # Stage 2 : Build image Docker (workflow réutilisable)
  build:
    needs: test
    uses: ./.github/workflows/reusable-docker.yml
    with:
      image-name: devops-app
      context: ./app

  # Stage 3 : Scan de sécurité
  security:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan application files
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: 'fs'
          scan-ref: 'app/'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          format: 'table'

  # Stage 4 : Test de l'action composite locale
  test-composite-action:
    needs: [build, security]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test setup-tools action
        uses: ./.github/actions/setup-tools
        with:
          install-terraform: 'true'
          terraform-version: '1.7.0'

  # Stage 5 : Deploy Staging
  deploy-staging:
    needs: [build, security, test-composite-action]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - run: echo "Deploying to staging environment..."

  # Stage 6 : Deploy Production
  deploy-production:
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Use secrets (example)
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          echo "Deploying to production environment..."
          echo "Secrets are masked in logs"
          echo "DB_PASSWORD length: ${#DB_PASSWORD}"
          echo "API_KEY length: ${#API_KEY}"