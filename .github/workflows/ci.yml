name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # Stage 1 : Tests unitaires
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: app/package-lock.json
      - run: cd app && npm ci
      - name: Run tests
        run: |
          cd app
          set -o pipefail
          npm test 2>&1 | tee test-output.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-output-node-${{ matrix.node-version }}
          path: app/test-output.txt

  # Stage 2 : Build image Docker (workflow réutilisable)
  build:
    needs: test
    uses: ./.github/workflows/reusable-docker.yml
    with:
      image-name: devops-app
      context: ./app

  # Stage 3 : Scan de sécurité avancé (Trivy + gitleaks)
  security-scan:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan dependencies with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'fs'
          scan-ref: 'app/'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'                     # Ne pas bloquer le pipeline
          format: 'table'

      - name: Build image for scanning
        run: docker build -t devops-app:scan app/

      - name: Scan Docker image
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: 'devops-app:scan'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'                     # Ne pas bloquer le pipeline
          format: 'sarif'
          output: 'trivy-results.sarif'
          args: '--ignorefile .trivyignore'  # Ignorer les CVE listées (optionnel)

      # Upload SARIF désactivé car manque de permissions sur le dépôt
      # - name: Upload Trivy scan results
      #   uses: github/codeql-action/upload-sarif@v3
      #   if: always()
      #   with:
      #     sarif_file: 'trivy-results.sarif'

      - name: Scan IaC with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: "config"
          scan-ref: "infra/"
          severity: "HIGH,CRITICAL"
          exit-code: "0"                     # Ne pas bloquer le pipeline

      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Stage 4 : Test de l'action composite locale
  test-composite-action:
    needs: [build, security-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test setup-tools action
        uses: ./.github/actions/setup-tools
        with:
          install-terraform: "true"
          terraform-version: "1.7.0"

  # Stage 5 : Déploiement sur l'environnement de staging
  deploy-staging:
    needs: [build, security-scan, test-composite-action]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - run: echo "Deploying to staging environment..."

  # Stage 6 : Déploiement sur l'environnement de production
  deploy-production:
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Use secrets (example)
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          echo "Deploying to production environment..."
          echo "Secrets are masked in logs"
          echo "DB_PASSWORD length: ${#DB_PASSWORD}"
          echo "API_KEY length: ${#API_KEY}"